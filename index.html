<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vatican Radio Player - Batan-ong Sakristan</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>

<body>

<div class="player">

<img src="https://www.vaticannews.va/etc/designs/vatican-news/release/library/main/images/rv/rv-esteso-bianco-small.png" class="logo"><br><br>

<div class="soundwave-container">
  <div class="soundwave" id="wave">
    <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
  </div>
</div>

<div class="button-group">
  <button onclick="playRadio()"><span class="material-icons">play_arrow</span></button>
  <button onclick="pauseRadio()"><span class="material-icons">pause</span></button>
</div>

<div id="nowPlaying">Loading schedule...</div>

<div class="schedule" id="schedule"></div><br><br>

<img src="logo.png" class="logo">

<div class="footer">
  © 2026 Batan-ong Sakristan | VaticanRadioPlayer <span id="version">v0</span>
</div>

</div>

<audio id="audio" autoplay src="https://radio.vaticannews.va/stream-en"></audio>
<script src="app.js"></script>
<script src="sw.js"></script>

</body>
</html>
