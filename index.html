<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRP Radio Player</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root{
  --bg: rgba(20,30,60,0.6);
  --text:#fff;
}
body{
  font-family:Montserrat;
  background:url("background.png") center/cover fixed;
  display:flex;justify-content:center;padding:20px;
}
.player{
  width:100%;max-width:820px;padding:25px;border-radius:20px;
  background:var(--bg);
  backdrop-filter:blur(16px);
  color:var(--text);
}
.logo{display:block;margin:auto;width:160px;}

/* Gradient glass items */
.item{
  margin:10px 0;padding:12px;border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid transparent;
  background-clip:padding-box;
  position:relative;
}
.item::before{
  content:"";
  position:absolute;inset:0;
  border-radius:12px;
  padding:1px;
  background:linear-gradient(120deg,#1a73e8,#00c6ff);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
}

.controls{display:flex;justify-content:center;gap:15px;margin:15px 0;}
button{width:50px;height:50px;border-radius:50%;border:none;background:#1a73e8;color:#fff;}

#volume{width:100%;}

.footer{text-align:center;margin-top:10px;font-size:12px;color:#ccc;}

.toggle{position:absolute;top:10px;right:10px;cursor:pointer;}

</style>
</head>
<body>

<div class="player">

<div class="toggle" onclick="toggleTheme()">
<span class="material-icons">dark_mode</span>
</div>

<img src="https://www.vaticannews.va/etc/designs/vatican-news/release/library/main/images/rv/rv-esteso-bianco-small.png" class="logo">

<div class="controls">
<button onclick="playRadio()"><span class="material-icons">play_arrow</span></button>
<button onclick="pauseRadio()"><span class="material-icons">pause</span></button>
<button onclick="muteToggle()"><span class="material-icons">volume_off</span></button>
</div>

<input type="range" id="volume" min="0" max="1" step="0.01" value="1">

<div id="nowPlaying">Loading...</div>
<div id="schedule"></div>

<img src="logo.png" class="logo">
<div class="footer">© 2026 Batan-ong Sakristan | VRP v1.0</div>

</div>

<audio id="audio" src="https://radio.vaticannews.va/stream-en" crossorigin="anonymous"></audio>

<script>
const audio=document.getElementById("audio");
const vol=document.getElementById("volume");

function playRadio(){audio.play();}
function pauseRadio(){audio.pause();}
function muteToggle(){audio.muted=!audio.muted;}

vol.oninput=()=>audio.volume=vol.value;

/* Offline detect */
audio.addEventListener("error",()=>{
 document.getElementById("nowPlaying").innerText="Stream Offline";
});

/* Theme toggle */
function toggleTheme(){
 const root=document.documentElement;
 if(root.style.getPropertyValue('--bg')==='white'){
  root.style.setProperty('--bg','rgba(20,30,60,0.6)');
  root.style.setProperty('--text','#fff');
 }else{
  root.style.setProperty('--bg','white');
  root.style.setProperty('--text','#000');
 }
}

/* Equalizer */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const src=ctx.createMediaElementSource(audio);
const analyser=ctx.createAnalyser();
src.connect(analyser);
analyser.connect(ctx.destination);

const data=new Uint8Array(analyser.frequencyBinCount);

function draw(){
 analyser.getByteFrequencyData(data);
 requestAnimationFrame(draw);
}
draw();

/* PWA */
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
